<!DOCTYPE html>
<html>
<body style="display:none;">

<script>
const passwort = prompt("Passwort:");

if (passwort === "geheim123") {
    document.body.style.display = "block";
} else {
    document.body.innerHTML = "<h1>Zugriff verweigert</h1>";
    document.body.style.display = "block";
}
</script>

<h1>Geheimer Inhalt</h1>
<p>Nur nach korrektem Passwort sichtbar.</p>

</body>
</html>
